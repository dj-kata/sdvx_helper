<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>SDVX Now Playing</title>
        <link href="https://fonts.googleapis.com/earlyaccess/nicomoji.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../out/websocket.css">
        <style>
            body {
                background-color: rgba(0, 0, 0, 0);
                margin: 0;
                padding: 0;
                overflow: hidden;
                color: #eeeeee;
                font-size: 24px;
                font-family: "Meiryo", sans-serif;
                text-shadow: 6px 6px 0 #000,
                             -2px 2px 0 #000,
                              2px -2px 0 #000,
                             -2px -2px 0 #000;
            }
            .titlearea {
                text-align: center;
                position: absolute;
                display: inline-block;
                top: -40px;
                left: 3px;
                height: 35px;
                width: 200px;
                font-size: 24px;
                font-weight: bold;
                color: #ffffff;
                background-color: #160eac;
                border: 1px solid #02144a;
                border-radius: 10px 10px 0 0;
                font-family: "LINE Seed JP App_TTF ExtraBold", "Meiryo", sans-serif;
                bottom: 100%;
                text-shadow:
                    1px 1px 1px #000, -1px -1px 1px #000,
                    -1px 1px 1px #000, 1px -1px 1px #000;
            }
            .kakomiarea {
                position: relative;
                margin: 2em auto;
                padding: 8px 8px 10px;
                width: 750px;
                height: auto;
                min-height: 30%;
                background-color: rgba(0, 0, 0, 0.6);
                border: 6px solid #02144a;
                box-sizing: border-box;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            td {
                vertical-align: top;
            }
            .jacket-cell {
                width: 570px;
                height: 570px;
            }
            #jacket {
                width: 570px;
                height: 570px;
                object-fit: contain;
                display: block;
            }
            .side {
                width: 150px;
                text-align: center;
                padding-left: 12px;
            }
            #level {
                width: 150px;
                max-height: 120px;
                object-fit: contain;
            }
            #bpm {
                width: 100px;
                max-height: 120px;
                object-fit: contain;
                margin-top: 28px;
            }
            .info-images {
                margin-top: 16px;
                text-align: center;
            }
            .info-images img {
                display: block;
                max-width: 710px;
                max-height: 78px;
                object-fit: contain;
                margin: 8px auto 0;
            }
            .fallback {
                display: none;
                margin-top: 18px;
                text-align: center;
                font-family: "Potta One", "Meiryo", sans-serif;
            }
            .fallback-title {
                font-size: 40px;
                line-height: 1.25;
                overflow-wrap: anywhere;
            }
            .fallback-meta {
                margin-top: 8px;
                font-size: 28px;
                color: #ccffff;
            }
            .empty {
                opacity: 0;
            }
        </style>
    </head>
    <body>
        <div class="kakomiarea">
            <span class="titlearea">now playing</span>
            <table>
                <tr>
                    <td class="jacket-cell">
                        <img src="" id="jacket" class="empty" alt="">
                    </td>
                    <td class="side">
                        <img src="" id="level" class="empty" alt=""><br>
                        <img src="" id="bpm" class="empty" alt="">
                    </td>
                </tr>
            </table>
            <div class="info-images">
                <img src="" id="title" class="empty" alt="">
                <img src="" id="effector" class="empty" alt="">
                <img src="" id="illustrator" class="empty" alt="">
            </div>
            <div class="fallback" id="fallback">
                <div class="fallback-title" id="fallback-title"></div>
                <div class="fallback-meta" id="fallback-meta"></div>
            </div>
        </div>
        <script src="./sdvx_ws_client.js"></script>
        <script>
        let usingWebSocketImages = false;
        function setImage(id, src) {
            const el = document.getElementById(id);
            if (!el) return;
            if (src) {
                if (el.dataset.currentSrc === src) return;
                el.dataset.requestSrc = src;
                const loader = new Image();
                loader.onload = function() {
                    if (el.dataset.requestSrc !== src) return;
                    el.src = src;
                    el.dataset.currentSrc = src;
                    el.classList.remove("empty");
                };
                loader.onerror = function() {
                    if (!el.dataset.currentSrc) el.classList.add("empty");
                };
                loader.src = src;
            } else {
                el.removeAttribute("src");
                delete el.dataset.currentSrc;
                delete el.dataset.requestSrc;
                el.classList.add("empty");
            }
        }
        function outputImageBase() {
            return location.pathname.indexOf("/template/") >= 0 ? "../out/" : "";
        }
        function updateFromFiles() {
            if (usingWebSocketImages) return;
            const base = outputImageBase();
            const stamp = Date.now();
            setImage("jacket", base + "select_jacket.png?" + stamp);
            setImage("level", base + "select_level.png?" + stamp);
            setImage("bpm", base + "select_bpm.png?" + stamp);
            setImage("title", base + "select_title.png?" + stamp);
            setImage("effector", base + "select_effector.png?" + stamp);
            setImage("illustrator", base + "select_illustrator.png?" + stamp);
        }
        function update(data) {
            if (!data) return;
            const images = data.images || {};
            usingWebSocketImages = Object.values(images).some(Boolean);
            setImage("jacket", images.jacket);
            setImage("level", images.level);
            setImage("bpm", images.bpm);
            setImage("title", images.title);
            setImage("effector", images.effector);
            setImage("illustrator", images.illustrator);

            const title = data.title || "";
            const meta = [
                data.difficulty || "",
                data.level ? "Lv." + data.level : "",
                data.bpm ? "BPM " + data.bpm : "",
            ].filter(Boolean).join(" / ");
            document.getElementById("fallback-title").textContent = title;
            document.getElementById("fallback-meta").textContent = meta;
            document.getElementById("fallback").style.display = images.title ? "none" : "block";
        }
        updateFromFiles();
        setInterval(updateFromFiles, 1000);
        SDVXWebSocketClient.connect({
            type: "nowplaying",
            target: "nowplaying",
            onData: update,
            onState: function(state) {
                if (state === "disconnected") updateFromFiles();
            }
        });
        </script>
    </body>
</html>
