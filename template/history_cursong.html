<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>SDVX Score History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">
    <style>
        :root { --websocket-port: 8767; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            font-family: "RocknRoll One", sans-serif;
            text-shadow: 2px 2px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
        }
        #all {
            position: absolute;
            inset: 0;
            min-width: 300px;
            min-height: 140px;
            border: clamp(2px, 1.4vh, 16px) solid #0010a8;
            background:
                linear-gradient(rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.42)),
                radial-gradient(circle at 35% 55%, rgba(80, 80, 80, 0.32), transparent 34%),
                #050505;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        td, th {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 1vw;
            line-height: 1.08;
        }
        #title {
            height: 8vh;
            background: linear-gradient(180deg, rgba(0,0,65,0.96), rgba(31,81,150,0.96));
            font-size: 6.4vh;
        }
        #music { text-align: left; }
        #difficulty { width: 15%; text-align: right; font-size: 5.9vh; }
        #lv { width: 14%; text-align: right; font-size: 5.9vh; color: #ffffaa; }
        #best {
            height: 13vh;
            background: rgba(255, 255, 255, 0.25);
        }
        #best tr:first-child {
            height: 4vh;
            background: #000;
            font-size: 2.6vh;
        }
        #best tr:nth-child(2) {
            height: 9vh;
            font-size: 5.7vh;
        }
        #best th, #best td { text-align: center; }
        #best .col-diff { width: 14%; }
        #best .col-lv { width: 8%; color: #ffffaa; }
        #best .col-tier { width: 9%; color: #ccccff; }
        #best .col-puc { width: 8%; color: #ffccff; }
        #best .col-score { width: 35%; color: #ffffcc; }
        #best .col-lamp { width: 14%; }
        #best .col-vf { width: 12%; color: #ccffcc; }
        #result {
            width: 80%;
            font-size: 5.7vh;
        }
        #result tr.header {
            height: 5vh;
            background: #000;
            font-size: 3.8vh;
        }
        #result tr.header td {
            font-size: 3.8vh !important;
            text-align: center;
        }
        #result tr.header td:first-child {
            text-align: left;
        }
        #result tr.play {
            height: 8vh;
            font-size: 5.7vh;
        }
        #result td:nth-child(1) { width: 38%; color: #ffffaa; text-align: left; }
        #result td:nth-child(2) { width: 22%; color: #fff; text-align: right; font-size: 6vh; }
        #result td:nth-child(3) { width: 20%; text-align: center; }
        #result td:nth-child(4) { width: 20%; text-align: center; padding-left: 0; }
        .lamp-icon { height: 6vh; vertical-align: middle; }
        .diff-NOV { color: #c060f0; }
        .diff-ADV { color: #d4bb00; }
        .diff-EXH { color: #e84040; }
        .diff-MXM { color: #e0e0e0; }
        .S { color: #ffff00; }
        .AAAplus, .AAA { color: #ffff28; }
        .AAplus, .AA { color: #c3c3c3; }
        .Aplus, .A { color: #2ddf71; }
        .B, .C, .D { color: #7777ff; }
        .lamp-played { color: #888; }
        .lamp-clear { color: #77ff77; }
        .lamp-exc { color: #ffc115; }
        .lamp-maxxive { color: #dddddd; }
        .lamp-uc { color: #ff7777; }
        .lamp-puc, .MAX {
            animation: flashmax 0.4s infinite;
            font-weight: bold;
        }
        @keyframes flashmax {
            0% { color: #ff2828; }
            20% { color: #d5ff28; }
            40% { color: #28ff7e; }
            60% { color: #2872ff; }
            80% { color: #d528ff; }
            100% { color: #ff2828; }
        }
    </style>
</head>
<body>
<div id="all">
    <table id="title">
        <tr>
            <td id="music">---</td>
            <td id="difficulty"></td>
            <td id="lv"></td>
        </tr>
    </table>
    <table id="best">
        <tr>
            <th class="col-diff">diff</th>
            <th class="col-lv">Lv</th>
            <th class="col-tier">Tier</th>
            <th class="col-puc">PUC</th>
            <th class="col-score">best score</th>
            <th class="col-lamp">best lamp</th>
            <th class="col-vf">VF</th>
        </tr>
        <tr>
            <td id="best-diff" class="col-diff"></td>
            <td id="best-lv" class="col-lv"></td>
            <td id="grade-s-tier" class="col-tier"></td>
            <td id="puc-tier" class="col-puc"></td>
            <td id="best-score" class="col-score"></td>
            <td id="best-lamp" class="col-lamp"></td>
            <td id="vf" class="col-vf"></td>
        </tr>
    </table>
    <table id="result">
        <tbody id="history-body"></tbody>
    </table>
</div>
<script>
function wsPort() {
    const params = new URLSearchParams(location.search);
    if (params.has("port")) return parseInt(params.get("port"), 10);
    const cssPort = getComputedStyle(document.documentElement).getPropertyValue("--websocket-port").trim();
    return parseInt(cssPort, 10) || 8767;
}
function esc(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
    });
}
function fmtScore(value) {
    const n = Number(value) || 0;
    return n ? n.toLocaleString("en-US") : "";
}
function shortScore(value) {
    const n = Number(value) || 0;
    return n ? Math.floor(n / 10000).toString() : "";
}
function grade(score) {
    score = Number(score) || 0;
    if (score >= 10000000) return '<span class="MAX">MAX</span>';
    if (score >= 9900000) return '<span class="S">S</span>';
    if (score >= 9800000) return '<span class="AAAplus">AAA+</span>';
    if (score >= 9700000) return '<span class="AAA">AAA</span>';
    if (score >= 9500000) return '<span class="AAplus">AA+</span>';
    if (score >= 9300000) return '<span class="AA">AA</span>';
    if (score >= 9000000) return '<span class="Aplus">A+</span>';
    if (score >= 8700000) return '<span class="A">A</span>';
    if (score >= 7500000) return '<span class="B">B</span>';
    return '<span class="D">D</span>';
}
function lampName(value) {
    return ["", "", "COMP", "EXC", "MXX", "UC", "PUC"][Number(value) || 0] || "";
}
function lampClass(value) {
    return ["lamp-noplay", "lamp-played", "lamp-clear", "lamp-exc", "lamp-maxxive", "lamp-uc", "lamp-puc"][Number(value) || 0] || "";
}
function lampHtml(value) {
    return '<span class="' + lampClass(value) + '">' + lampName(value) + "</span>";
}
function lampIcon(value) {
    const files = ["", "log_lamp_failed.png", "log_lamp_clear.png", "log_lamp_hard.png", "log_lamp_exh.png", "log_lamp_uc.png", "log_lamp_puc.png"];
    const file = files[Number(value) || 0];
    return file ? '<img class="lamp-icon" src="../resources/' + file + '">' : "";
}
function update(data) {
    if (!data) return;
    const diff = data.difficulty || "";
    document.getElementById("music").textContent = data.title || "---";
    document.getElementById("difficulty").innerHTML = '<span class="diff-' + esc(diff) + '">' + esc(diff) + "</span>";
    document.getElementById("lv").textContent = data.lv ? "Lv." + data.lv : "";
    document.getElementById("best-diff").innerHTML = '<span class="diff-' + esc(diff) + '">' + esc(diff) + "</span>";
    document.getElementById("best-lv").textContent = data.lv || "";
    document.getElementById("grade-s-tier").textContent = data.gradeS_tier || "";
    document.getElementById("puc-tier").textContent = data.PUC_tier || "";
    document.getElementById("best-score").textContent = fmtScore(data.best_score);
    document.getElementById("best-lamp").innerHTML = lampHtml(data.best_lamp);
    document.getElementById("vf").textContent = data.vf ? (Number(data.vf) / 10).toFixed(1) : "";

    let out = '<tr class="header"><td>date</td><td>score</td><td>grade</td><td>lamp</td></tr>';
    (data.items || []).slice(0, 5).forEach(function(item) {
        out += '<tr class="play">';
        out += '<td>' + esc(item.date || "") + "</td>";
        out += '<td>' + shortScore(item.score) + "</td>";
        out += '<td>' + (item.grade ? esc(item.grade) : grade(item.score)) + "</td>";
        out += '<td>' + lampIcon(item.lamp) + "</td>";
        out += "</tr>";
    });
    document.getElementById("history-body").innerHTML = out;
}
function connect() {
    const ws = new WebSocket("ws://localhost:" + wsPort());
    ws.onmessage = function(event) {
        const msg = JSON.parse(event.data);
        if (msg.type === "cursong" || msg.type === "history_cursong") update(msg.data);
    };
    ws.onclose = function() { setTimeout(connect, 3000); };
}
connect();
</script>
</body>
</html>
