<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>SDVX Score History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">
    <style>
        :root { --websocket-port: 8767; }
        body {
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            margin: 10px;
            padding: 10px;
            overflow: hidden;
            font-family: "RocknRoll One", sans-serif;
            font-size: 64px;
            color: #fff;
            text-shadow: 6px 6px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
        }
        #all {
            border: 16px solid #000077;
            box-sizing: border-box;
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: hidden;
        }
        #title {
            color: #fff;
            font-size: 90px;
            line-height: 140%;
            width: 100%;
            background: linear-gradient(180deg, rgba(0,0,60,0.9), rgba(35,85,155,0.9));
            border-collapse: collapse;
        }
        #title td { white-space: nowrap; padding: 0 18px; }
        #title td:nth-child(1) { max-width: 10px; overflow: hidden; text-overflow: ellipsis; }
        #title td:nth-child(2) { width: 13%; }
        #title td:nth-child(3) { width: 10%; text-align: right; }
        #best {
            font-size: 80px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.35);
            border-collapse: collapse;
        }
        #best td { white-space: nowrap; text-align: center; padding: 0 10px; }
        #best tr:nth-child(1) { color: #fff; background-color: #000; font-size: 40px; }
        #best tr:nth-child(2) td:nth-child(2) { color: #ffffcc; }
        #best tr:nth-child(2) td:nth-child(3) { color: #ccccff; }
        #best tr:nth-child(2) td:nth-child(4) { color: #ffccff; }
        #result { font-size: 72px; width: 100%; border-collapse: collapse; }
        #result td { border: none; vertical-align: middle; white-space: nowrap; padding: 0 16px; }
        #result tr:nth-child(1) { background-color: #000; }
        #result td:nth-child(1) { font-size: 50px; width: 24%; }
        #result td:nth-child(2) { width: 12%; text-align: center; }
        #result td:nth-child(3) { width: 22%; text-align: right; }
        #result td:nth-child(4) { width: 14%; text-align: center; }
        #result td:nth-child(5) { width: 14%; text-align: right; color: #ccccff; }
        #result td:nth-child(6) { width: 14%; text-align: right; color: #ffccff; }
        .diff-NOV { color: #c060f0; }
        .diff-ADV { color: #d4bb00; }
        .diff-EXH { color: #e84040; }
        .diff-MXM { color: #e0e0e0; }
        .S { color: #ffff00; }
        .AAAplus, .AAA { color: #ffff28; }
        .AAplus, .AA { color: #c3c3c3; }
        .Aplus, .A { color: #2ddf71; }
        .B { color: #7777ff; }
        .lamp-played { color: #888; }
        .lamp-clear { color: #33aaff; }
        .lamp-exc { color: #ff66cc; }
        .lamp-maxxive { color: #eeeeee; }
        .lamp-uc { color: #ff7777; }
        .lamp-puc, .MAX {
            animation: flashmax 0.4s infinite;
            font-weight: bold;
        }
        @keyframes flashmax {
            0% { color: #ff2828; }
            20% { color: #d5ff28; }
            40% { color: #28ff7e; }
            60% { color: #2872ff; }
            80% { color: #d528ff; }
            100% { color: #ff2828; }
        }
    </style>
</head>
<body>
<div id="all">
    <table id="title">
        <tr>
            <td id="music">---</td>
            <td id="difficulty"></td>
            <td id="lv"></td>
        </tr>
    </table>
    <table id="best">
        <tr>
            <td>plays</td>
            <td>best score</td>
            <td>best ex</td>
            <td>lamp</td>
            <td>last played</td>
        </tr>
        <tr>
            <td id="play-count">0</td>
            <td id="best-score">0</td>
            <td id="best-ex">0</td>
            <td id="best-lamp"></td>
            <td id="last-played"></td>
        </tr>
    </table>
    <table id="result">
        <tbody id="history-body"></tbody>
    </table>
</div>
<script>
function wsPort() {
    const params = new URLSearchParams(location.search);
    if (params.has("port")) return parseInt(params.get("port"), 10);
    const cssPort = getComputedStyle(document.documentElement).getPropertyValue("--websocket-port").trim();
    return parseInt(cssPort, 10) || 8767;
}
function esc(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
    });
}
function fmtScore(value) {
    const n = Number(value) || 0;
    return n ? n.toLocaleString("en-US") : "";
}
function grade(score) {
    score = Number(score) || 0;
    if (score >= 10000000) return '<span class="MAX">MAX</span>';
    if (score >= 9900000) return '<span class="S">S</span>';
    if (score >= 9800000) return '<span class="AAAplus">AAA+</span>';
    if (score >= 9700000) return '<span class="AAA">AAA</span>';
    if (score >= 9500000) return '<span class="AAplus">AA+</span>';
    if (score >= 9300000) return '<span class="AA">AA</span>';
    if (score >= 9000000) return '<span class="Aplus">A+</span>';
    if (score >= 8700000) return '<span class="A">A</span>';
    if (score >= 7500000) return '<span class="B">B</span>';
    return "";
}
function lampName(value) {
    return ["NO PLAY", "FAILED", "COMP", "EXC", "MAXXIVE", "UC", "PUC"][Number(value) || 0] || "";
}
function lampClass(value) {
    return ["lamp-noplay", "lamp-played", "lamp-clear", "lamp-exc", "lamp-maxxive", "lamp-uc", "lamp-puc"][Number(value) || 0] || "";
}
function update(data) {
    if (!data) return;
    const diff = data.difficulty || "";
    document.getElementById("music").textContent = data.title || "---";
    document.getElementById("difficulty").innerHTML = '<span class="diff-' + esc(diff) + '">' + esc(diff) + "</span>";
    document.getElementById("lv").textContent = data.lv ? "Lv." + data.lv : "";
    document.getElementById("play-count").textContent = data.play_count || 0;
    document.getElementById("best-score").textContent = fmtScore(data.best_score);
    document.getElementById("best-ex").textContent = data.best_ex || "";
    document.getElementById("best-lamp").innerHTML = '<span class="' + lampClass(data.best_lamp) + '">' + lampName(data.best_lamp) + "</span>";
    document.getElementById("last-played").textContent = data.last_played || "";

    let out = "<tr><td><center>date</center></td><td></td><td><center>score</center></td><td><center>grade</center></td><td>ex</td><td>diff</td></tr>";
    (data.items || []).forEach(function(item) {
        const scoreDiff = (Number(item.score) || 0) - (Number(item.pre_score) || 0);
        const exDiff = item.exscore == null ? "" : (Number(item.exscore) - (Number(item.pre_ex) || 0));
        out += "<tr>";
        out += "<td>" + esc(item.date || "") + "</td>";
        out += '<td><span class="' + lampClass(item.lamp) + '">' + lampName(item.lamp) + "</span></td>";
        out += "<td>" + fmtScore(item.score) + "</td>";
        out += "<td>" + (item.grade ? esc(item.grade) : grade(item.score)) + "</td>";
        out += "<td>" + (item.exscore == null ? "" : esc(item.exscore)) + "</td>";
        out += "<td>" + (scoreDiff > 0 ? "+" : "") + scoreDiff.toLocaleString("en-US") + (exDiff !== "" ? " / " + (exDiff > 0 ? "+" : "") + exDiff : "") + "</td>";
        out += "</tr>";
    });
    document.getElementById("history-body").innerHTML = out;
}
function connect() {
    const ws = new WebSocket("ws://localhost:" + wsPort());
    ws.onmessage = function(event) {
        const msg = JSON.parse(event.data);
        if (msg.type === "cursong" || msg.type === "history_cursong") update(msg.data);
    };
    ws.onclose = function() { setTimeout(connect, 3000); };
}
connect();
</script>
</body>
</html>
