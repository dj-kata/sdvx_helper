<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>SDVX Score History</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Monomaniac+One&display=swap" rel="stylesheet">
        <style>
            :root { --websocket-port: 8767; }
            body {
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            margin: 10px;
            padding: 10px;
            overflow: hidden;
            font-family:"RocknRoll One";
            color:#2196F3;
            font-size: 64px;
            color: #fff;
            text-shadow: 6px 6px 0 #000,
                         -2px 2px 0 #000,
                         2px -2px 0 #000,
                         -2px -2px 0 #000;
            }
            div#all{
                border: 16px solid #000077;
                -moz-box-sizing:border-box;
                box-sizing: border-box;
                position: absolute;
                top:0;
                bottom:0;
                left:0;
                right:0;
                background-color: rgba(0, 0, 0, 0.95);
                overflow: hidden;
            }
            table#title {
                color: #fff;
                background-color: rgba(0, 0, 100, 0.95);
                font-size: 90px;
                line-height: 140%;
                width:100%;
                background-color: #222;
                background: linear-gradient(
                180deg
                ,rgba(0,0,60,0.9)
                ,rgba(35,85,155,0.9)
                );
            }
            table#title td{
                white-space:nowrap;
            }
            table#title td:nth-child(1){
                overflow:hidden;
                text-overflow:ellipsis;
            }
            table#result {
                font-size: 96px;
                width:100%;
                border: none;
            }
            table#result td {
                border: none;
                vertical-align: middle;
                white-space:nowrap;
            }
            table#result tr:nth-child(1) {
                background-color: #000;
            }
            table#result td:nth-child(1) {
                font-size: 80px;
                width:32%;
            }
            table#result td:nth-child(2) {
                font-size: 80px;
                width:8%;
            }
            table#result td:nth-child(3) {
                width:16%;
                padding-right:3%;
                text-align: right;
            }
            table#result td:nth-child(4) {
                font-size: 80px;
                width:14%;
                text-align:left;
            }
            table#result td:nth-child(5) {
                width:14%;
                text-align:right;
                color:#ccffff;
            }
            table#result td:nth-child(6) {
                width:16%;
                margin-left:3%;
                text-align:center;
            }
            table#best {
                font-size: 80px;
                width:100%;
                background-color: rgba(255, 255, 255, 0.35);
            }
            table#best td {
                white-space:nowrap;
                text-align:center;
            }
            table#best tr:nth-child(1) {
                color:#fff;
                background-color: #000;
                font-size:40px;
                width:20%;
                text-align: center;
            }
            table#best tr:nth-child(2) {
                color:#ffffff;
                text-align: center;
            }
            table#best tr:nth-child(2) td:nth-child(1){
                width: 13%;
            }
            table#best tr:nth-child(2) td:nth-child(2){
                color:#ffffcc;
                width: 8%;
            }
            table#best tr:nth-child(2) td:nth-child(3){
                color:#ccccff;
                width: 8%;
            }
            table#best tr:nth-child(2) td:nth-child(4){
                color:#ccccff;
                width: 8%;
            }
            table#best tr:nth-child(2) td:nth-child(5){
                color:#ffccff;
                width: 28%;
            }
            table#best tr:nth-child(2) td:nth-child(7){
                color:#ccffcc;
                width: 14%;
            }
            .MAX{
                animation-name: flashmax;
                animation-duration: 0.4s;
                animation-iteration-count: infinite;
            }
            @keyframes flashmax {
                0%   { color: #ff2828; }
                20%  { color: #d5ff28; }
                40%  { color: #28ff7e; }
                60%  { color: #2872ff; }
                80%  { color: #d528ff; }
                100% { color: #ff2828; }
            }
            .S{ color:#ffff00; }
            .AAAplus{ color:#ffff28; }
            .AAA{ color:#ffff28; }
            .AAplus{ color:#c3c3c3; }
            .AA{ color:#c3c3c3; }
            .Aplus{ color:#2ddf71; }
            .A{ color:#2ddf71; }
            .B{ color:#7777ff; }
            .C{ color:#7777ff; }
            .D{ color:#7777ff; }
            .E{ color:#7777ff; }
            .F{ color:#7777ff; }
            .fc{
                animation-name: flashfc;
                animation-duration: 0.2s;
                animation-iteration-count: infinite;
            }
            @keyframes flashfc {
                0%   { background-color: #ff2828; }
                20%  { background-color: #d5ff28; }
                40%  { background-color: #28ff7e; }
                60%  { background-color: #2872ff; }
                80%  { background-color: #d528ff; }
                100% { background-color: #ff2828; }
            }
            .failed{
                animation-name: flashfailed;
                animation-duration: 0.8s;
                animation-iteration-count: infinite;
            }
            @keyframes flashfailed {
                0%   { color: #ff2828; }
                50%  { color: #282828; }
                100% { color: #ff2828; }
            }
            .clear{color: #77ff77;}
            .hard{color: #ffc115;}
            .maxxive{color: #dddddd;}
            .uc{color: #ff7777;}
            .puc{color: #ffff99;}
        </style>
    </head>
    <body>
        <div id="all">
            <table id="title">
                <tbody>
                    <tr>
                        <td id="music">---</td>
                    </tr>
                </tbody>
            </table>
            <table id="best">
                <tbody>
                    <tr>
                        <td height="50">diff</td>
                        <td>Lv</td>
                        <td>Tier</td>
                        <td>PUC</td>
                        <td>best score</td>
                        <td>best lamp</td>
                        <td>VF</td>
                    </tr>
                    <tr>
                        <td id="best-diff"></td>
                        <td id="best-lv"></td>
                        <td id="grade-s-tier"></td>
                        <td id="puc-tier"></td>
                        <td id="best-score"></td>
                        <td id="best-lamp"></td>
                        <td id="vf"></td>
                    </tr>
                </tbody>
            </table>
            <table id="result">
                <tbody id="history-body"></tbody>
            </table>
        </div>
        <script>
        function wsPort() {
            const params = new URLSearchParams(location.search);
            if (params.has("port")) return parseInt(params.get("port"), 10);
            const cssPort = getComputedStyle(document.documentElement).getPropertyValue("--websocket-port").trim();
            return parseInt(cssPort, 10) || 8767;
        }
        function esc(value) {
            return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
                return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
            });
        }
        function fmtScore(value) {
            const n = Number(value) || 0;
            return n ? n.toLocaleString("en-US") : "";
        }
        function shortScore(value) {
            const n = Number(value) || 0;
            return n ? Math.floor(n / 10000).toString() : "";
        }
        function fmtExScore(value) {
            return value == null ? "" : String(value);
        }
        function grade(score) {
            score = Number(score) || 0;
            if (score >= 10000000) return '<span class="MAX">MAX</span>';
            if (score >= 9900000) return '<span class="S">S</span>';
            if (score >= 9800000) return '<span class="AAAplus">AAA+</span>';
            if (score >= 9700000) return '<span class="AAA">AAA</span>';
            if (score >= 9500000) return '<span class="AAplus">AA+</span>';
            if (score >= 9300000) return '<span class="AA">AA</span>';
            if (score >= 9000000) return '<span class="Aplus">A+</span>';
            if (score >= 8700000) return '<span class="A">A</span>';
            if (score >= 7500000) return '<span class="B">B</span>';
            return '<span class="D">D</span>';
        }
        function lampText(value) {
            return ["", "FAILED", "COMP", "EXC", "MAXXIVE", "UC", "PUC"][Number(value) || 0] || "";
        }
        function lampClass(value) {
            return ["", "failed", "clear", "hard", "maxxive", "uc", "puc"][Number(value) || 0] || "";
        }
        function lampHtml(value) {
            return '<span class="' + lampClass(value) + '">' + lampText(value) + "</span>";
        }
        function lampIcon(value) {
            const files = ["", "log_lamp_failed.png", "log_lamp_clear.png", "log_lamp_hard.png", "log_lamp_exh.png", "log_lamp_uc.png", "log_lamp_puc.png"];
            const file = files[Number(value) || 0];
            return file ? '<img src="../resources/' + file + '" height="80">' : "";
        }
        function update(data) {
            if (!data) return;
            const diff = data.display_difficulty || data.cdiff || data.difficulty || "";
            document.getElementById("music").textContent = data.title || "---";
            document.getElementById("best-diff").textContent = diff ? "(" + diff + ")" : "";
            document.getElementById("best-lv").textContent = data.lv || "";
            document.getElementById("grade-s-tier").textContent = data.gradeS_tier || "";
            document.getElementById("puc-tier").textContent = data.PUC_tier || "";
            document.getElementById("best-score").textContent = fmtScore(data.best_score);
            document.getElementById("best-lamp").innerHTML = lampHtml(data.best_lamp);
            document.getElementById("vf").textContent = data.vf ? (Number(data.vf) / 10).toFixed(1) : "";

            let out = '<tr><td height="50"><font size="40"><center>date</center></font></td>';
            out += '<td></td>';
            out += '<td colspan="2" height="40"><font size="40"><center>score</center></font></td>';
            out += '<td height="50"><font size="40"><center>EX</center></font></td>';
            out += '<td height="50"><font size="40"><center>lamp</center></font></td></tr>';
            (data.items || []).slice(0, 5).forEach(function(item) {
                out += '<tr>';
                out += '<td><font color="#ffffaa">' + esc(item.date || "") + "</font></td>";
                out += '<td></td>';
                out += '<td>' + shortScore(item.score) + "</td>";
                out += '<td>' + (item.grade ? esc(item.grade) : grade(item.score)) + "</td>";
                out += '<td>' + fmtExScore(item.exscore) + "</td>";
                out += '<td>' + lampIcon(item.lamp) + "</td>";
                out += "</tr>";
            });
            document.getElementById("history-body").innerHTML = out;
        }
        function connect() {
            const ws = new WebSocket("ws://localhost:" + wsPort());
            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.type === "cursong" || msg.type === "history_cursong") update(msg.data);
            };
            ws.onclose = function() { setTimeout(connect, 3000); };
        }
        connect();
        </script>
    </body>
</html>
