<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>SDVX Current Song</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">
        <style>
            * { box-sizing: border-box; }

            body {
                background: linear-gradient(135deg, #0a0a1f 0%, #1a0a2e 50%, #0a0a1f 100%);
                margin: 0;
                padding: 10px;
                overflow: hidden;
                font-family: 'RocknRoll One', sans-serif;
                color: #fff;
            }

            #all { max-width: 1900px; margin: 0 auto; }

            /* ─── タイトルカード ─── */
            .title-card {
                background: linear-gradient(135deg, rgba(60, 10, 100, 0.9), rgba(30, 5, 60, 0.9));
                border-radius: 12px;
                padding: 12px 20px;
                margin-bottom: 10px;
                box-shadow: 0 5px 20px rgba(160, 80, 255, 0.3);
                border: 2px solid rgba(160, 80, 255, 0.4);
            }

            .title-row {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .title-name {
                font-size: 46px;
                flex-grow: 1;
                text-shadow: 3px 3px 0 #000, -1px 1px 0 #000;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .title-meta {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 4px;
                min-width: 200px;
            }

            .title-lv-diff {
                font-size: 38px;
                white-space: nowrap;
                text-shadow: 2px 2px 0 #000;
            }

            .lv-num { color: #ffeb3b; }
            .diff-nov { color: #c060f0; }
            .diff-adv { color: #d4bb00; }
            .diff-exh { color: #e84040; }
            .diff-mxm { color: #e0e0e0; }

            .title-plays {
                font-size: 22px;
                color: #bb99dd;
            }

            /* ─── ベストスコアカード ─── */
            .best-section {
                display: flex;
                gap: 10px;
                margin-bottom: 10px;
            }

            .best-card {
                background: linear-gradient(135deg, rgba(30, 20, 50, 0.9), rgba(20, 15, 35, 0.9));
                border-radius: 12px;
                padding: 10px 18px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
                border: 2px solid rgba(120, 60, 180, 0.3);
                flex: 1;
            }

            .best-card h3 {
                font-size: 22px;
                margin: 0 0 6px 0;
                color: #bb88ee;
                text-shadow: 1px 1px 0 #000;
            }

            .best-value {
                font-size: 46px;
                font-weight: bold;
                text-shadow: 2px 2px 0 #000;
            }

            .best-label {
                font-size: 18px;
                color: #888;
                margin-top: 3px;
            }

            /* ランプタグ */
            .lamp-tag {
                display: inline-block;
                padding: 3px 12px;
                border-radius: 5px;
                font-size: 24px;
                font-weight: bold;
                text-shadow: 1px 1px 0 #000;
            }

            .lamp-noplay  { background: #1a1a1a; color: #555; }
            .lamp-played  { background: #333;    color: #aaa; }
            .lamp-clear   { background: #1840a0; color: #aaddff; }
            .lamp-exc     { background: #803000; color: #ffaa66; }
            .lamp-maxxive { background: #604000; color: #ffcc44; }
            .lamp-uc      { background: #205030; color: #88ffaa; }
            .lamp-puc     { background: #807000; color: #ffe080;
                            animation: flashpuc 0.6s infinite alternate; }

            @keyframes flashpuc {
                0%   { background: #606000; color: #ffd060; }
                100% { background: #a09000; color: #fff0a0; }
            }

            /* ─── 履歴テーブル ─── */
            .history-card {
                background: linear-gradient(135deg, rgba(30, 20, 50, 0.9), rgba(20, 15, 35, 0.9));
                border-radius: 12px;
                padding: 8px 15px 15px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
                border: 2px solid rgba(120, 60, 180, 0.3);
            }

            .history-table {
                width: 100%;
                border-collapse: collapse;
            }

            .history-table tr {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .history-table td {
                padding: 6px 8px;
                white-space: nowrap;
                font-size: 24px;
                text-shadow: 1px 1px 0 #000;
            }

            /* 日付 */
            .history-table td:nth-child(1) { width: 180px; color: #9999cc; }
            /* スコア */
            .history-table td:nth-child(2) { width: 170px; text-align: right; font-weight: bold; }
            /* グレード */
            .history-table td:nth-child(3) { width: 80px; text-align: center; font-size: 22px; }
            /* EX */
            .history-table td:nth-child(4) { width: 110px; text-align: right; color: #aaaaff; font-size: 20px; }
            /* ランプ */
            .history-table td:nth-child(5) { width: 120px; text-align: center; }
            /* VF */
            .history-table td:nth-child(6) { width: 80px; text-align: center; color: #ffdd88; font-size: 22px; }
            /* スコア差分 */
            .history-table td:nth-child(7) { width: 110px; text-align: right; font-size: 20px; }

            .score-up  { color: #ff88ff; }
            .score-same { color: #888; }

            /* グレードカラー */
            .grade-s    { color: #ffdd00; text-shadow: 0 0 8px rgba(255,220,0,0.6); }
            .grade-aaap { color: #ffffff; }
            .grade-aaa  { color: #eeeeee; }
            .grade-aap  { color: #ccffcc; }
            .grade-aa   { color: #aaffaa; }
            .grade-ap   { color: #88ff88; }
            .grade-a    { color: #66ee66; }
            .grade-b    { color: #8888ff; }
            .grade-c    { color: #6666dd; }
            .grade-d    { color: #4444bb; }
        </style>
    </head>
    <body>
        <script>
        function getWebSocketPort() {
            var params = new URLSearchParams(window.location.search);
            if (params.has('port')) return parseInt(params.get('port'));
            var css = getComputedStyle(document.documentElement).getPropertyValue('--websocket-port').trim();
            return parseInt(css) || 8767;
        }

        var ws = null;
        var reconnectTimer = null;

        function connectWebSocket() {
            var port = getWebSocketPort();
            ws = new WebSocket('ws://localhost:' + port);

            ws.onopen = function() {
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onmessage = function(event) {
                try {
                    var msg = JSON.parse(event.data);
                    if (msg.type === 'cursong') updateCursong(msg.data);
                } catch(e) { console.error('parse error:', e); }
            };

            ws.onerror = function() {};

            ws.onclose = function() {
                if (!reconnectTimer) reconnectTimer = setTimeout(connectWebSocket, 3000);
            };
        }

        var LAMP_NAMES   = ['NO PLAY','PLAYED','CLEAR','EXC','MAXXIVE','UC','PUC'];
        var LAMP_CLASSES = ['lamp-noplay','lamp-played','lamp-clear','lamp-exc','lamp-maxxive','lamp-uc','lamp-puc'];

        function lampHtml(lampVal) {
            var idx = Math.min(Math.max(lampVal || 0, 0), 6);
            return '<span class="lamp-tag ' + LAMP_CLASSES[idx] + '">' + LAMP_NAMES[idx] + '</span>';
        }

        function getDiffClass(diff) {
            if (!diff) return '';
            var d = diff.toUpperCase();
            if (d === 'NOV') return 'diff-nov';
            if (d === 'ADV') return 'diff-adv';
            if (d === 'EXH') return 'diff-exh';
            if (d === 'MXM') return 'diff-mxm';
            return '';
        }

        function getGradeClass(grade) {
            if (!grade) return '';
            var g = grade.toUpperCase();
            if (g === 'S')    return 'grade-s';
            if (g === 'AAA+') return 'grade-aaap';
            if (g === 'AAA')  return 'grade-aaa';
            if (g === 'AA+')  return 'grade-aap';
            if (g === 'AA')   return 'grade-aa';
            if (g === 'A+')   return 'grade-ap';
            if (g === 'A')    return 'grade-a';
            if (g === 'B')    return 'grade-b';
            if (g === 'C')    return 'grade-c';
            return 'grade-d';
        }

        function updateCursong(data) {
            if (!data) return;

            // タイトル
            document.getElementById('title-name').textContent = data.title || '';

            // LV・難易度
            var diff = data.difficulty || '';
            var diffClass = getDiffClass(diff);
            document.getElementById('title-lv-diff').innerHTML =
                '<span class="lv-num">' + (data.lv || '') + '</span>' +
                ' <span class="' + diffClass + '">' + diff + '</span>';

            // プレイ数
            document.getElementById('title-plays').textContent =
                'PLAYS: ' + (data.play_count || 0) +
                (data.last_played ? '  |  Last: ' + data.last_played : '');

            // ベストスコア
            var bs = Number(data.best_score) || 0;
            document.getElementById('best-score-val').textContent = bs.toLocaleString();

            // ベストEX
            var be = data.best_ex != null ? data.best_ex : '-';
            document.getElementById('best-ex-val').textContent = be;

            // ベストランプ
            document.getElementById('best-lamp-val').innerHTML = lampHtml(data.best_lamp || 0);

            // 履歴テーブル
            var items = data.items || [];
            var out = '';
            for (var i = items.length - 1; i >= 0; i--) {
                var item = items[i];
                var score = Number(item.score) || 0;
                var pre = Number(item.pre_score) || 0;
                var diff_score = score - pre;
                var diffStr = diff_score > 0 ? '<span class="score-up">+' + diff_score + '</span>'
                            : diff_score < 0 ? '<span class="score-same">' + diff_score + '</span>'
                            : '<span class="score-same">±0</span>';

                var gradeClass = getGradeClass(item.grade || '');

                out += '<tr>';
                out += '<td>' + (item.date || '') + '</td>';
                out += '<td>' + score.toLocaleString() + '</td>';
                out += '<td class="' + gradeClass + '">' + (item.grade || '') + '</td>';
                out += '<td>' + (item.exscore != null ? item.exscore : '') + '</td>';
                out += '<td>' + lampHtml(item.lamp || 0) + '</td>';
                out += '<td>' + (item.vf != null ? item.vf : '') + '</td>';
                out += '<td>' + diffStr + '</td>';
                out += '</tr>';

                if (i < items.length - 20) break;
            }
            document.getElementById('history-tbody').innerHTML = out;
        }

        window.addEventListener('DOMContentLoaded', function() { connectWebSocket(); });
        window.addEventListener('beforeunload', function() { if (ws) ws.close(); });
        </script>

        <div id="all">
            <!-- タイトルカード -->
            <div class="title-card">
                <div class="title-row">
                    <div id="title-name" class="title-name">---</div>
                    <div class="title-meta">
                        <div id="title-lv-diff" class="title-lv-diff">-- --</div>
                        <div id="title-plays" class="title-plays">PLAYS: 0</div>
                    </div>
                </div>
            </div>

            <!-- ベストセクション -->
            <div class="best-section">
                <div class="best-card">
                    <h3>BEST SCORE</h3>
                    <div id="best-score-val" class="best-value">0</div>
                </div>
                <div class="best-card">
                    <h3>BEST EX</h3>
                    <div id="best-ex-val" class="best-value">-</div>
                </div>
                <div class="best-card">
                    <h3>BEST LAMP</h3>
                    <div id="best-lamp-val" class="best-value"></div>
                </div>
            </div>

            <!-- 履歴テーブル -->
            <div class="history-card">
                <table class="history-table">
                    <tbody id="history-tbody"></tbody>
                </table>
            </div>
        </div>
    </body>
</html>
